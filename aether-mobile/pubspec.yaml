name: borsa_app
description: Borsa — Deep Space Trading App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP Client (Spring backend)
  dio: ^5.4.3+1

  # Fonts
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # Shared preferences (token, settings saklama)
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
